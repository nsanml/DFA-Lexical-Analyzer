<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DFA Sözcük Analizi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        body { margin: 0; padding: 0; height: 100vh; overflow: hidden; background-color: #f8fafc; }
        #dfaGraphCanvas { width: 100%; height: 100%; border: 1px solid #e2e8f0; border-radius: 0.375rem; background-color: #ffffff; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="text-slate-800 font-sans flex flex-col p-4 box-border">

    <h1 class="text-2xl font-bold text-center text-indigo-600 mb-4 shrink-0">DFA Sözcük Tarayıcı (Lexical Analyzer)</h1>
    
    <div class="flex-1 grid grid-cols-12 gap-4 min-h-0">
        
        <div class="col-span-4 flex flex-col gap-4 min-h-0">
            
            <div class="bg-white p-3 rounded-md border border-slate-200 shadow-sm shrink-0">
                <h2 class="text-sm font-semibold mb-2 text-slate-700">1. Konfigürasyon Yükle</h2>
                <input type="file" id="jsonFileInput" accept=".json" class="block w-full text-xs text-slate-500 file:mr-2 file:py-1 file:px-3 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 mb-1"/>
                <div id="configStatus" class="text-xs text-red-500 font-medium">dfa_config.json yüklenmedi.</div>
            </div>

            <div class="bg-white p-3 rounded-md border border-slate-200 shadow-sm shrink-0 flex flex-col">
                <h2 class="text-sm font-semibold mb-2 text-slate-700">2. Analiz Edilecek Kod</h2>
                <textarea id="codeInput" rows="4" class="w-full p-2 border border-slate-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500 font-mono text-sm resize-none" placeholder="Örn: while ( 1sayi < 5 )"></textarea>
                <div class="flex gap-2 mt-2">
                    <button id="analyzeBtn" class="flex-1 bg-indigo-600 text-white font-bold py-1.5 px-3 rounded hover:bg-indigo-700 transition text-sm disabled:opacity-50" disabled>Analiz Et</button>
                    <button id="clearPathBtn" class="bg-slate-500 text-white font-bold py-1.5 px-3 rounded hover:bg-slate-600 transition text-sm disabled:opacity-50" disabled>Yolu Temizle</button>
                </div>
            </div>

            <div class="bg-white p-3 rounded-md border border-slate-200 shadow-sm flex-1 flex flex-col min-h-0">
                <h2 class="text-sm font-semibold mb-2 text-slate-700">Analiz Sonuçları</h2>
                <div class="overflow-y-auto flex-1 border border-slate-100 rounded">
                    <table class="min-w-full text-xs">
                        <thead class="bg-slate-50 sticky top-0">
                            <tr>
                                <th class="py-1.5 px-2 border-b text-left font-semibold text-slate-600">Lexeme</th>
                                <th class="py-1.5 px-2 border-b text-left font-semibold text-slate-600">Token Türü</th>
                            </tr>
                        </thead>
                        <tbody id="resultBody">
                            <tr><td colspan="2" class="py-4 text-center text-slate-500 italic">Henüz analiz yapılmadı. Yolu görmek için sonuca tıklayın.</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="col-span-8 bg-white p-3 rounded-md border border-slate-200 shadow-sm relative flex flex-col min-h-0">
            <h2 class="text-sm font-semibold mb-2 text-slate-700 absolute top-4 left-4 z-10 bg-white/80 px-2 py-1 rounded">DFA</h2>
            <div class="flex-1 min-h-0 w-full relative">
                <div id="dfaGraphCanvas" class="absolute inset-0"></div>
            </div>
        </div>
        
    </div>

    <script>
        let dfaConfig = null;
        let network = null;
        let nodesDS = new vis.DataSet();
        let edgesDS = new vis.DataSet();

        document.getElementById('jsonFileInput').addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        dfaConfig = JSON.parse(e.target.result);
                        
                        if (!dfaConfig.states.includes("q_err")) {
                            dfaConfig.states.push("q_err");
                        }
                        if (!dfaConfig.transitions["q_err"]) {
                            dfaConfig.transitions["q_err"] = { "a-z": "q_err", "0-9": "q_err", "op_simple": "q_err", "=": "q_err" };
                        }

                        document.getElementById('configStatus').textContent = "Konfigürasyon yüklendi.";
                        document.getElementById('configStatus').classList.replace('text-red-500', 'text-green-600');
                        document.getElementById('analyzeBtn').disabled = false;
                        document.getElementById('clearPathBtn').disabled = false;

                        drawBaseDFA(dfaConfig);

                    } catch (error) {
                        alert("Geçersiz JSON dosyası!");
                        console.error(error);
                    }
                };
                reader.readAsText(file);
            }
        });

        function drawBaseDFA(config) {
            nodesDS.clear();
            edgesDS.clear();

            config.states.forEach(state => {
                const isAccept = config.accept_states && config.accept_states[state];
                const isStart = (state === config.start_state);
                const isError = (state === "q_err");
                
                nodesDS.add({
                    id: state,
                    label: state + (isAccept ? `\n(${config.accept_states[state]})` : (isError ? '\n(Dead State)' : '')),
                    shape: isAccept ? 'doublecircle' : 'circle',
                    color: {
                        background: isStart ? '#ffedd5' : (isError ? '#fee2e2' : 'white'),
                        border: isAccept ? '#16a34a' : (isError ? '#ef4444' : '#334155')
                    },
                    font: { 
                        size: isStart ? 16 : 14, 
                        multi: true, 
                        bold: isStart || isError,
                        color: isError ? '#ef4444' : '#334155' 
                    },
                    borderWidth: (isAccept || isError) ? 3 : 1
                });
            });

            for (const fromState in config.transitions) {
                const transitions = config.transitions[fromState];
                for (const char in transitions) {
                    const toState = transitions[char];
                    const existingEdge = edgesDS.get({
                        filter: function (item) {
                            return item.from === fromState && item.to === toState;
                        }
                    });

                    if (existingEdge.length > 0) {
                        let newLabel = existingEdge[0].label;
                        if (!newLabel.includes(char)) {
                            newLabel += ', ' + char;
                            edgesDS.update({id: existingEdge[0].id, label: newLabel});
                        }
                    } else {
                        edgesDS.add({
                            from: fromState,
                            to: toState,
                            label: char,
                            arrows: 'to',
                            color: { color: '#94a3b8' },
                            font: { align: 'top', size: 10 }
                        });
                    }
                }
            }

            const container = document.getElementById('dfaGraphCanvas');
            const data = { nodes: nodesDS, edges: edgesDS };
            const options = {
                physics: { 
                    enabled: true, 
                    barnesHut: { gravitationalConstant: -2500, centralGravity: 0.4, springLength: 120 } 
                },
                interaction: { hover: true, tooltipDelay: 200 },
                layout: { randomSeed: 2 } 
            };
            network = new vis.Network(container, data, options);
        }

        function getNextState(currentState, char) {
            const transitions = dfaConfig.transitions[currentState];
            if (!transitions) return null;

            if (transitions[char]) return transitions[char];
            if (transitions["a-z"] && /[a-zA-Z]/.test(char)) return transitions["a-z"];
            if (transitions["0-9"] && /[0-9]/.test(char)) return transitions["0-9"];
            if (transitions["op_simple"] && /[+\-*/<>]/.test(char)) return transitions["op_simple"];

            return null;
        }

        function simulateDFA(word) {
            if (!dfaConfig) return null;
            
            let currentState = dfaConfig.start_state;
            let path = [currentState]; 
            let errorChar = null;

            for (let i = 0; i < word.length; i++) {
                const char = word[i];
                let nextState = getNextState(currentState, char);
                
                if (!nextState && currentState === "q_err") {
                    nextState = "q_err";
                }
                
                if (nextState) {
                    currentState = nextState;
                    path.push(currentState);
                } else {
                    if (!errorChar) errorChar = char;
                    currentState = "q_err";
                    path.push(currentState);
                }
            }

            if (currentState === "q_err") {
                 return { accepted: false, path: path, tokenType: `HATA ('${errorChar}')` };
            }

            const acceptType = dfaConfig.accept_states[currentState];
            if (acceptType) {
                return { accepted: true, path: path, tokenType: acceptType };
            } else {
                return { accepted: false, path: path, tokenType: "RED / EKSİK" };
            }
        }

        document.getElementById('analyzeBtn').addEventListener('click', function() {
            const code = document.getElementById('codeInput').value;
            const resultBody = document.getElementById('resultBody');
            resultBody.innerHTML = '';

            const words = code.match(/[a-zA-Z0-9]+|==|!=|[!=<>\+\-\*\/%]+/g) || [];

            if (words.length === 0) {
                resultBody.innerHTML = '<tr><td colspan="2" class="py-4 text-center text-slate-500">Token bulunamadı.</td></tr>';
                return;
            }

            words.forEach((word) => {
                const simResult = simulateDFA(word);

                const row = document.createElement('tr');
                row.className = "hover:bg-indigo-50 transition cursor-pointer border-b";
                row.dataset.path = JSON.stringify(simResult.path);
                
                row.innerHTML = `
                    <td class="py-1.5 px-2 font-mono text-slate-900 border-r" title="İzlenen Yol: ${simResult.path.join(' → ')}">${word}</td>
                    <td class="py-1.5 px-2 font-semibold ${simResult.accepted ? 'text-green-600' : 'text-red-600'}">${simResult.tokenType}</td>
                `;
                
                row.addEventListener('click', function() {
                    highlightPath(JSON.parse(this.dataset.path));
                });

                resultBody.appendChild(row);
            });
        });

        document.getElementById('clearPathBtn').addEventListener('click', function() {
            clearHighlight();
        });

        function clearHighlight() {
            if (!network) return;
            
            nodesDS.forEach(node => {
                const isAccept = dfaConfig.accept_states && dfaConfig.accept_states[node.id];
                const isStart = (node.id === dfaConfig.start_state);
                const isError = (node.id === "q_err");
                nodesDS.update({
                    id: node.id, 
                    color: { 
                        background: isStart ? '#ffedd5' : (isError ? '#fee2e2' : 'white'), 
                        border: isAccept ? '#16a34a' : (isError ? '#ef4444' : '#334155') 
                    },
                    font: { color: isError ? '#ef4444' : '#334155', bold: isStart || isError }
                });
            });
            edgesDS.forEach(edge => {
                edgesDS.update({id: edge.id, color: {color: '#94a3b8'}, width: 1, dashes: false});
            });
        }

        function highlightPath(path) {
            if (!network) return;
            
            clearHighlight(); 

            for (let i = 0; i < path.length; i++) {
                let isCurrentErrorNode = path[i] === "q_err";
                
                nodesDS.update({
                    id: path[i], 
                    color: { background: isCurrentErrorNode ? '#7f1d1d' : '#fecaca', border: '#b91c1c' },
                    font: { color: isCurrentErrorNode ? '#ffffff' : '#b91c1c', bold: true }
                });

                if (i < path.length - 1) {
                    const from = path[i];
                    const to = path[i+1];
                    const edge = edgesDS.get({
                        filter: function (item) { return item.from === from && item.to === to; }
                    });
                    
                    if (edge.length > 0) {
                        edgesDS.update({id: edge[0].id, color: {color: '#b91c1c'}, width: 2.5});
                    } else if (to === "q_err" && from !== "q_err") {
                        const virtualEdgeId = `virtual_error_edge_${from}`;
                        
                        if (edgesDS.get(virtualEdgeId) === null) {
                            edgesDS.add({
                                id: virtualEdgeId,
                                from: from,
                                to: "q_err",
                                label: "Hata",
                                arrows: 'to',
                                color: { color: '#7f1d1d' },
                                width: 2.5,
                                dashes: true,
                                font: { color: '#7f1d1d', background: 'white' }
                            });
                        } else {
                             edgesDS.update({ id: virtualEdgeId, color: { color: '#7f1d1d' }, width: 2.5, dashes: true });
                        }
                    }
                }
            }
        }
    </script>
</body>
</html>
